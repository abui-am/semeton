<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PetaTrip — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #0c0e10;
    color: #f2f0ec;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { display: none; }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50%      { opacity: 1;   transform: translateY(-2px); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .stage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    background:
      radial-gradient(ellipse 1000px 600px at 50% 0%, rgba(255,138,76,0.08), transparent 70%),
      radial-gradient(ellipse 800px 500px at 0% 100%, rgba(94,201,216,0.05), transparent 70%),
      #07090A;
  }
  .device-wrap > * { animation: fadeUp 380ms ease-out both; }
</style>
</head>
<body>
<div class="stage">
  <div id="root" class="device-wrap"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="m_shared.jsx"></script>
<script type="text/babel" src="m_screens.jsx"></script>

<script type="text/babel">
var { useState } = React;

function App() {
  var [trip, setTrip] = useState(null); // null = onboarding
  var [tab, setTab] = useState("today");
  var [stop, setStop] = useState(null);
  var [mood, setMood] = useState(() => localStorage.getItem("peta.mood") || "curious");
  React.useEffect(() => { localStorage.setItem("peta.mood", mood); }, [mood]);

  var screen;
  if (tab === "today") screen = <TodayScreen trip={trip || { days: 4 }} onOpenStop={setStop} onAskChat={() => setTab("chat")} mood={mood} setMood={setMood} />;
  else if (tab === "chat") screen = <ChatScreen onOpenStop={setStop} />;
  else if (tab === "map") screen = <MapScreen onOpenStop={setStop} />;
  else if (tab === "saved") screen = <SavedScreen />;

  return (
    <IOSDevice dark={true}>
      <div data-screen-label={trip ? `App · ${tab}` : "Onboarding"} style={{ position: "relative", width: "100%", height: "100%", background: PETA_T.bg, overflow: "hidden" }}>
        {!trip && <Onboarding onDone={(t) => setTrip(t)} />}
        {trip && (
          <>
            <div key={tab} style={{ position: "absolute", inset: 0, animation: "fadeUp 260ms ease-out both" }}>
              {screen}
            </div>
            <BottomNav tab={tab} setTab={setTab} />
            <StopDrawer stop={stop} onClose={() => setStop(null)} />
          </>
        )}
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
